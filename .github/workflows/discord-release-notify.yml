name: Discord Release Notify

# Announce a new MantaTools release to a Discord channel when a GitHub release is
# published. electron-builder uploads the installers to a DRAFT release; this
# fires only once that draft is actually published.
on:
  release:
    types: [published]

# No GITHUB_TOKEN permissions needed — we only read the event payload (a local
# file) and POST to an external Discord webhook.
permissions: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Send release announcement to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_RELEASE_WEBHOOK }}
          RELEASE_NAME: ${{ github.event.release.name }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          RELEASE_BODY: ${{ github.event.release.body }}
          RELEASE_TIME: ${{ github.event.release.published_at }}
        run: |
          set -euo pipefail

          if [ -z "${DISCORD_WEBHOOK:-}" ]; then
            echo "::error::DISCORD_RELEASE_WEBHOOK secret is not set; skipping."
            exit 1
          fi

          # Branding images (logo icon + the HTML-designed release banner).
          LOGO="https://api.mantagames.id/imgs/logo.png?v=2"
          BANNER="https://raw.githubusercontent.com/MantaTools/mantatools-download/main/assets/release-banner.png?v=3"

          # Version label: prefer the release name, fall back to the tag.
          VERSION="${RELEASE_NAME:-}"
          [ -z "$VERSION" ] && VERSION="${RELEASE_TAG:-}"

          # Release notes. Fall back to a generic line, trim to stay well under
          # Discord's 4096-char embed limit, and drop any byte a mid-string cut
          # left invalid so jq/Discord never choke on broken UTF-8.
          BODY="${RELEASE_BODY:-}"
          if [ -z "$BODY" ]; then
            BODY="Versi baru MantaTools sudah tersedia."
          fi
          BODY=$(printf '%s' "$BODY" | head -c 3000 | iconv -f utf-8 -t utf-8 -c)

          # No links in the body — the app updates itself, so that is the CTA.
          DESC=$(printf '%s\n\n-# Buka aplikasi untuk memperbarui otomatis.' "$BODY")

          # Build the webhook payload with jq so all escaping is handled safely
          # (the release notes are untrusted free text).
          PAYLOAD=$(jq -n \
            --arg author "Update Aplikasi Tersedia" \
            --arg logo "$LOGO" \
            --arg title "MantaTools ${VERSION}" \
            --arg desc "$DESC" \
            --arg banner "$BANNER" \
            --arg ts "$RELEASE_TIME" \
            --arg footer "Manta Games • Rilis ${RELEASE_TAG}" \
            '{
              username: "MantaTools",
              avatar_url: $logo,
              embeds: [ {
                author: { name: $author, icon_url: $logo },
                title: $title,
                description: $desc,
                color: 959977,
                image: { url: $banner },
                footer: { text: $footer, icon_url: $logo },
                timestamp: $ts
              } ]
            }')

          curl -sS -f \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$PAYLOAD" \
            "$DISCORD_WEBHOOK"
