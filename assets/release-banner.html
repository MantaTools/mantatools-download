<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 1200px;
        height: 480px;
      }
      body {
        font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
        /* Flat near-black with a subtle center vignette for depth (no glow). */
        background: radial-gradient(1000px 640px at 50% 42%, #15171f, #0a0b10 72%);
        color: #fff;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 30px;
      }
      .logo {
        width: 96px;
        height: 96px;
      }
      .title {
        font-size: 82px;
        font-weight: 800;
        letter-spacing: -2px;
      }
      .accent {
        width: 104px;
        height: 4px;
        border-radius: 2px;
        background: linear-gradient(90deg, #0ea5e9, #3b82f6);
      }
    </style>
  </head>
  <body>
    <img class="logo" src="logo.png" alt="" />
    <div class="title">MantaTools Release</div>
    <div class="accent"></div>
  </body>
</html>
